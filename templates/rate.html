<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #fff5f9; min-height: 100vh; color: #3d0020; padding-bottom: 100px; }
.topbar { padding: 14px 20px; display: flex; align-items: center; background: white; position: sticky; top: 0; z-index: 20; box-shadow: 0 2px 12px rgba(233,30,140,0.08); }
.topbar h2 { flex: 1; text-align: center; font-size: 18px; font-weight: bold; color: #880e4f; }
.icon-btn { background: #fff0f7; border: 1.5px solid #f8bbd0; border-radius: 50%; width: 36px; height: 36px; font-size: 16px; cursor: pointer; color: #e91e8c; display: flex; align-items: center; justify-content: center; text-decoration: none; transition: transform 0.2s; }
.icon-btn:hover { transform: scale(1.1); }
.content { padding: 24px 16px; }
.upload-zone {
    border-radius: 26px; background: white; border: 2px dashed #f8bbd0;
    padding: 40px 20px; display: flex; flex-direction: column; align-items: center;
    cursor: pointer; transition: all 0.2s; margin-bottom: 20px;
    position: relative; overflow: hidden; min-height: 260px; justify-content: center;
    box-shadow: 0 2px 12px rgba(233,30,140,0.06);
}
.upload-zone:hover { border-color: #e91e8c; background: #fff0f7; }
.upload-zone.has-img { border-style: solid; border-color: #e91e8c; }
.upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-zone .u-icon { font-size: 52px; margin-bottom: 14px; }
.upload-zone h3 { font-size: 18px; color: #880e4f; margin-bottom: 6px; }
.upload-zone p { font-size: 13px; color: #f48fb1; }
.preview-img { width: 100%; max-height: 300px; object-fit: cover; border-radius: 18px; display: none; }
.info-card { background: white; border-radius: 20px; padding: 18px; border: 1.5px solid #f8bbd0; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(233,30,140,0.06); }
.info-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid #fce4ff; font-size: 13px; color: #880e4f; }
.info-row:last-child { border-bottom: none; }
.info-row span:first-child { font-size: 20px; }
.submit-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 14px 16px; border-top: 1px solid #f8bbd0; box-shadow: 0 -4px 16px rgba(233,30,140,0.08); z-index: 20; }
.submit-btn { width: 100%; padding: 15px; background: linear-gradient(135deg,#e91e8c,#f06292,#ce93d8); color: white; border: none; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 16px rgba(233,30,140,0.35); transition: transform 0.2s; }
.submit-btn:hover { transform: translateY(-2px); }
</style>
</head>
<body>
<div class="topbar">
    <a class="icon-btn" onclick="history.back()">←</a>
    <h2>💗 Rate My Look</h2>
    <a href="/home" class="icon-btn">🏠</a>
</div>
<div class="content">
<form action="/rate_result" method="POST" enctype="multipart/form-data">
<div class="upload-zone" id="uploadZone">
    <div class="u-icon">🤳</div>
    <h3>Upload Your Outfit</h3>
    <p>Tap to choose a photo</p>
    <img id="ratePreview" class="preview-img">
    <input type="file" name="outfit" accept="image/*" required onchange="showPreview(this)">
</div>
<div class="info-card">
    <div class="info-row"><span>🎨</span> AI analyzes colors, patterns & style</div>
    <div class="info-row"><span>📊</span> Get a style score out of 10</div>
    <div class="info-row"><span>💡</span> Personalized tips to improve your look</div>
    <div class="info-row"><span>⚡</span> Results in seconds</div>
</div>
<div class="submit-bar">
    <button type="submit" class="submit-btn">⭐ Rate My Look!</button>
</div>
</form>
</div>
<script>
function showPreview(input) {
    if (input.files && input.files[0]) {
        const img = document.getElementById('ratePreview');
        const zone = document.getElementById('uploadZone');
        img.src = URL.createObjectURL(input.files[0]);
        img.style.display = 'block';
        zone.querySelector('.u-icon').style.display = 'none';
        zone.querySelector('h3').style.display = 'none';
        zone.querySelector('p').style.display = 'none';
        zone.classList.add('has-img');
    }
}
</script>
</body>
</html>
