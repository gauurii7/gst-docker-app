<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(160deg, #ffe4f0 0%, #ffd6e8 40%, #fce4ff 100%);
    height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; overflow: hidden;
}
.hearts { position: absolute; width: 100%; height: 100%; pointer-events: none; }
.heart {
    position: absolute; font-size: 20px; opacity: 0;
    animation: floatUp 4s ease-in infinite;
}
.heart:nth-child(1)  { left: 10%; animation-delay: 0s;   font-size: 16px; }
.heart:nth-child(2)  { left: 25%; animation-delay: 0.6s; font-size: 22px; }
.heart:nth-child(3)  { left: 45%; animation-delay: 1.2s; font-size: 14px; }
.heart:nth-child(4)  { left: 65%; animation-delay: 0.3s; font-size: 20px; }
.heart:nth-child(5)  { left: 80%; animation-delay: 1.8s; font-size: 18px; }
.heart:nth-child(6)  { left: 55%; animation-delay: 2.4s; font-size: 12px; }
@keyframes floatUp {
    0%   { opacity: 0; transform: translateY(100vh) scale(0.5); }
    20%  { opacity: 0.7; }
    80%  { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-20vh) scale(1.2); }
}
.logo-wrap { position: relative; text-align: center; z-index: 1; }
.logo-icon { font-size: 56px; display: block; margin-bottom: 10px; animation: popIn 0.8s cubic-bezier(0.175,0.885,0.32,1.275); }
@keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.logo {
    font-size: 52px; font-weight: 900; letter-spacing: 3px;
    background: linear-gradient(135deg, #e91e8c, #f06292, #ce93d8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: shimmer 2s ease infinite;
    background-size: 200%;
}
@keyframes shimmer { 0%,100% { background-position: 0%; } 50% { background-position: 100%; } }
.tagline {
    font-size: 14px; color: #c2185b; margin-top: 10px; letter-spacing: 2px;
    text-transform: uppercase; opacity: 0;
    animation: fadeUp 0.6s ease 0.7s forwards;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.loader-bar {
    width: 140px; height: 4px; background: rgba(233,30,140,0.15);
    border-radius: 10px; margin: 32px auto 0; overflow: hidden;
    opacity: 0; animation: fadeUp 0.4s ease 1s forwards;
}
.loader-fill {
    height: 100%; width: 0;
    background: linear-gradient(90deg, #e91e8c, #f48fb1, #ce93d8);
    border-radius: 10px; animation: fill 2.2s ease 1.1s forwards;
}
@keyframes fill { to { width: 100%; } }
</style>
<script>setTimeout(() => { window.location.href = "/login"; }, 3400);</script>
</head>
<body>
<div class="hearts">
    <span class="heart">💗</span><span class="heart">🌸</span>
    <span class="heart">💕</span><span class="heart">✨</span>
    <span class="heart">💖</span><span class="heart">🌷</span>
</div>
<div class="logo-wrap">
    <span class="logo-icon">👗</span>
    <div class="logo">StyleMe</div>
    <div class="tagline">Your AI Style BFF 💅</div>
    <div class="loader-bar"><div class="loader-fill"></div></div>
</div>
</body>
</html>
