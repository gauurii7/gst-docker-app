<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: Arial, sans-serif; min-height: 100vh;
    background: linear-gradient(160deg, #ffe4f0, #fce4ff, #ffd6e8);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
}
.blob {
    position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.5;
    animation: blobMove 6s ease-in-out infinite alternate;
}
.blob1 { width: 300px; height: 300px; background: #f48fb1; top: -80px; left: -80px; }
.blob2 { width: 250px; height: 250px; background: #ce93d8; bottom: -60px; right: -60px; animation-delay: 2s; }
.blob3 { width: 200px; height: 200px; background: #f8bbd0; top: 40%; left: 60%; animation-delay: 1s; }
@keyframes blobMove { from { transform: translate(0,0) scale(1); } to { transform: translate(20px,20px) scale(1.1); } }

.card {
    background: rgba(255,255,255,0.75); backdrop-filter: blur(20px);
    border-radius: 32px; padding: 40px 32px; width: 92%; max-width: 380px;
    box-shadow: 0 8px 40px rgba(233,30,140,0.12), 0 2px 8px rgba(0,0,0,0.06);
    border: 1px solid rgba(255,255,255,0.9);
    animation: slideUp 0.5s ease; text-align: center; position: relative; z-index: 1;
}
@keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }

.brand-icon { font-size: 44px; margin-bottom: 6px; animation: bounce 1.5s ease infinite alternate; }
@keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-8px); } }
.brand { font-size: 30px; font-weight: 900; background: linear-gradient(135deg,#e91e8c,#f06292,#ce93d8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom: 4px; }
.sub { color: #e91e8c; font-size: 13px; margin-bottom: 28px; opacity: 0.7; }

.tab-row { display: flex; background: #fce4ff; border-radius: 20px; padding: 4px; margin-bottom: 24px; }
.tab { flex: 1; padding: 9px; border-radius: 16px; border: none; background: transparent; font-size: 14px; cursor: pointer; color: #c2185b; font-weight: bold; transition: all 0.2s; }
.tab.active { background: white; box-shadow: 0 2px 8px rgba(233,30,140,0.15); color: #e91e8c; }

.input-group { position: relative; margin-bottom: 14px; }
.input-group .i-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 17px; }
.input-group input {
    width: 100%; padding: 14px 16px 14px 46px;
    background: #fff0f7; border: 1.5px solid #f8bbd0;
    border-radius: 14px; font-size: 15px; color: #4a0020; outline: none;
    transition: border 0.2s, box-shadow 0.2s;
}
.input-group input:focus { border-color: #e91e8c; box-shadow: 0 0 0 3px rgba(233,30,140,0.1); }
.input-group input::placeholder { color: #f48fb1; }

.login-btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, #e91e8c, #f06292, #ce93d8);
    color: white; border: none; border-radius: 30px;
    font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 6px;
    box-shadow: 0 6px 20px rgba(233,30,140,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
}
.login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(233,30,140,0.45); }
.login-btn:active { transform: scale(0.98); }

.divider { color: #f48fb1; font-size: 12px; margin: 18px 0; }
.guest-btn {
    width: 100%; padding: 13px; background: transparent;
    color: #e91e8c; border: 2px solid #f48fb1; border-radius: 30px;
    font-size: 14px; cursor: pointer; transition: all 0.2s;
}
.guest-btn:hover { background: #fff0f7; border-color: #e91e8c; }
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>
<div class="card">
    <div class="brand-icon">💅</div>
    <div class="brand">StyleMe</div>
    <div class="sub">Your AI Style BFF</div>
    <div class="tab-row">
        <button class="tab active">Login</button>
        <button class="tab">Sign Up</button>
    </div>
    <form action="/home" method="POST">
        <div class="input-group"><span class="i-icon">👤</span><input type="text" placeholder="Username" required></div>
        <div class="input-group"><span class="i-icon">🔒</span><input type="password" placeholder="Password" required></div>
        <button class="login-btn">✨ Let's Style!</button>
    </form>
    <div class="divider">── or ──</div>
    <form action="/home" method="POST">
        <button class="guest-btn">🌸 Continue as Guest</button>
    </form>
</div>
</body>
</html>
